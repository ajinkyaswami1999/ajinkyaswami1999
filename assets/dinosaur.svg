<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;family=Orbitron:wght@700&amp;display=swap');

      .bg { fill: #08110C; }
      .grid { stroke: #11251B; stroke-width: 0.8; }
      .accent { stroke: #39FF14; stroke-width: 1.5; fill: none; filter: drop-shadow(0 0 3px #39FF14); }
      .accent-dim { stroke: #39FF14; stroke-width: 1; fill: none; opacity: 0.4; }
      .amber { fill: #F5B301; font-family: 'JetBrains Mono', monospace; font-size: 8px; }
      .text-title { font-family: 'Orbitron', sans-serif; font-weight: 700; fill: #FFFFFF; font-size: 14px; letter-spacing: 2px; }
      .text-info { font-family: 'JetBrains Mono', monospace; fill: #9CA3AF; font-size: 9px; }
      
      @keyframes pulse {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 0.8; }
      }
      @keyframes scanner {
        0% { transform: translateY(0px); }
        50% { transform: translateY(220px); }
        100% { transform: translateY(0px); }
      }
      .anim-pulse { animation: pulse 3s infinite ease-in-out; }
      .anim-scan { animation: scanner 6s infinite linear; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" class="bg" />

  <!-- Grid lines -->
  <g class="anim-pulse">
    <!-- Verticals -->
    <line x1="50" y1="0" x2="50" y2="300" class="grid" />
    <line x1="100" y1="0" x2="100" y2="300" class="grid" />
    <line x1="150" y1="0" x2="150" y2="300" class="grid" />
    <line x1="200" y1="0" x2="200" y2="300" class="grid" />
    <line x1="250" y1="0" x2="250" y2="300" class="grid" />
    <line x1="300" y1="0" x2="300" y2="300" class="grid" />
    <line x1="350" y1="0" x2="350" y2="300" class="grid" />
    <!-- Horizontals -->
    <line x1="0" y1="50" x2="400" y2="50" class="grid" />
    <line x1="0" y1="100" x2="400" y2="100" class="grid" />
    <line x1="0" y1="150" x2="400" y2="150" class="grid" />
    <line x1="0" y1="200" x2="400" y2="200" class="grid" />
    <line x1="0" y1="250" x2="400" y2="250" class="grid" />
  </g>

  <!-- Title block -->
  <g transform="translate(20, 30)">
    <text x="0" y="0" class="text-title">SYS.SCHEMA: RAPTOR_08</text>
    <text x="0" y="15" class="text-info">SPECIES: Velociraptor mongoliensis</text>
    <text x="0" y="27" class="text-info">DNA PURITY: 94.6% (AMBER SOURCE)</text>
  </g>

  <!-- Technical schematics (Dinosaur Skeleton Outline) -->
  <g transform="translate(40, 60)">
    <!-- Raptor Skeleton / Body Outline -->
    <!-- Tail -->
    <path d="M 10,130 Q 80,100 130,90 Q 180,85 220,100" class="accent-dim" />
    <!-- Spine and Head -->
    <path d="M 220,100 Q 250,95 270,70 Q 285,45 305,50 Q 320,55 330,70 Q 335,80 320,90 Q 300,95 285,95 Q 260,105 250,120" class="accent" />
    <!-- Ribcage & Chest -->
    <ellipse cx="250" cy="130" rx="25" ry="35" class="accent-dim" transform="rotate(-15, 250, 130)" />
    <!-- Jaw -->
    <path d="M 320,90 L 305,95 L 295,90" class="accent" />
    <!-- Arm -->
    <path d="M 270,120 L 285,135 L 295,130" class="accent" />
    <path d="M 268,125 L 280,138 L 290,135" class="accent-dim" />
    <!-- Hind Leg (Leg 1) -->
    <path d="M 210,110 Q 190,150 200,180 L 220,210 L 230,205" class="accent" />
    <path d="M 200,180 L 195,190 L 190,188" class="accent" /> <!-- Sickle Claw -->
    <!-- Hind Leg (Leg 2 background) -->
    <path d="M 220,112 Q 205,150 212,175 L 230,202 L 238,198" class="accent-dim" opacity="0.6" />
    <!-- Tail bone structure dots (Tech style) -->
    <circle cx="20" cy="128" r="2" fill="#39FF14" />
    <circle cx="50" cy="116" r="2" fill="#39FF14" />
    <circle cx="80" cy="106" r="2" fill="#39FF14" />
    <circle cx="110" cy="98" r="2" fill="#39FF14" />
    <circle cx="140" cy="93" r="2" fill="#39FF14" />
    <circle cx="170" cy="91" r="2" fill="#39FF14" />
    <circle cx="200" cy="95" r="2" fill="#39FF14" />
  </g>

  <!-- Technical annotations / Callouts -->
  <g transform="translate(10, 10)">
    <!-- Eye pointer -->
    <line x1="350" y1="120" x2="385" y2="120" stroke="#39FF14" stroke-width="0.8" stroke-dasharray="2,2" />
    <circle cx="350" cy="120" r="3" fill="none" stroke="#39FF14" stroke-width="1" />
    <text x="310" y="115" class="amber">OPTICAL SENSORS</text>
    
    <!-- Sickle claw pointer -->
    <line x1="235" y1="240" x2="280" y2="270" stroke="#39FF14" stroke-width="0.8" stroke-dasharray="2,2" />
    <circle cx="235" cy="240" r="3" fill="none" stroke="#39FF14" stroke-width="1" />
    <text x="285" y="273" class="amber">SICKLE CLAW: HAZARD</text>

    <!-- Brain cavity pointer -->
    <line x1="340" y1="110" x2="310" y2="70" stroke="#39FF14" stroke-width="0.8" stroke-dasharray="2,2" />
    <circle cx="340" cy="110" r="3" fill="none" stroke="#39FF14" stroke-width="1" />
    <text x="235" y="65" class="amber">NEURAL DENSITY: HIGH</text>
  </g>

  <!-- Laser scanner bar -->
  <g class="anim-scan">
    <line x1="0" y1="40" x2="400" y2="40" stroke="#39FF14" stroke-width="1" opacity="0.6" filter="drop-shadow(0 0 2px #39FF14)" />
    <rect x="0" y="38" width="400" height="4" fill="#39FF14" fill-opacity="0.05" />
  </g>
</svg>
