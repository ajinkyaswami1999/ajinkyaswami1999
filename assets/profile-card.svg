<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 220" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;family=Orbitron:wght@700;900&amp;family=Rajdhani:wght@600;700&amp;display=swap');

      .bg { fill: #11251B; fill-opacity: 0.95; stroke: #F5B301; stroke-width: 2; rx: 10px; }
      .inner-bg { fill: #08110C; stroke: #11251B; stroke-width: 1.5; rx: 6px; }
      .text-title { font-family: 'Orbitron', sans-serif; font-weight: 900; fill: #FFFFFF; font-size: 14px; letter-spacing: 2px; }
      .text-subtitle { font-family: 'Rajdhani', sans-serif; font-weight: 700; fill: #F5B301; font-size: 9px; letter-spacing: 3px; }
      .text-name { font-family: 'Orbitron', sans-serif; font-weight: 700; fill: #39FF14; font-size: 13px; }
      .text-field { font-family: 'JetBrains Mono', monospace; fill: #9CA3AF; font-size: 8px; }
      .text-val { font-family: 'JetBrains Mono', monospace; fill: #FFFFFF; font-size: 9px; font-weight: 700; }
      .barcode { fill: #FFFFFF; }
      
      @keyframes pulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
      .anim-pulse { animation: pulse 3s infinite ease-in-out; }
    </style>

    <linearGradient id="badgeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39FF14" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#F5B301" stop-opacity="0.1" />
    </linearGradient>
  </defs>

  <!-- Card Body -->
  <rect width="350" height="220" class="bg" />
  <rect width="350" height="220" fill="url(#badgeGlow)" rx="10" />

  <!-- ID Badge Clip Slot (Top Center) -->
  <rect x="150" y="8" width="50" height="10" rx="3" fill="#08110C" stroke="#11251B" stroke-width="1" />

  <!-- Header -->
  <g transform="translate(20, 35)">
    <text x="0" y="0" class="text-title">INGEN LABORATORY SECURITY</text>
    <text x="0" y="12" class="text-subtitle">AUTOMATION &amp; CONTAINMENT DIVISION</text>
    <line x1="0" y1="18" x2="310" y2="18" stroke="#F5B301" stroke-width="1.5" opacity="0.5" />
  </g>

  <!-- Photo Box (Left) -->
  <g transform="translate(20, 65)">
    <rect width="80" height="100" class="inner-bg" />
    <!-- Holographic Avatar Silhouette -->
    <path d="M 40,30 Q 30,30 30,45 Q 30,55 20,65 L 15,95 L 65,95 L 60,65 Q 50,55 50,45 Q 50,30 40,30 Z" fill="none" stroke="#39FF14" stroke-width="1.5" class="anim-pulse" />
    <circle cx="40" cy="40" r="8" fill="none" stroke="#39FF14" stroke-width="1.5" class="anim-pulse" />
    <!-- Grid Overlay on Photo Box -->
    <line x1="0" y1="85" x2="80" y2="85" stroke="#39FF14" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.5" />
    <text x="40" y="15" text-anchor="middle" font-family="'JetBrains Mono', monospace" fill="#39FF14" font-size="7" opacity="0.7">SWAMI, A.</text>
  </g>

  <!-- Employee Info Block (Right) -->
  <g transform="translate(115, 65)">
    <rect width="215" height="100" class="inner-bg" />
    
    <g transform="translate(15, 20)">
      <text x="0" y="0" class="text-field">NAME:</text>
      <text x="60" y="0" class="text-name">AJINKYA SWAMI</text>

      <text x="0" y="18" class="text-field">CLEARANCE:</text>
      <text x="60" y="18" class="text-val" fill="#E53935">LEVEL 5 (RESTRICTED)</text>

      <text x="0" y="32" class="text-field">ROLE:</text>
      <text x="60" y="32" class="text-val">SR. QA AUTOMATION ENG</text>

      <text x="0" y="46" class="text-field">SECTOR:</text>
      <text x="60" y="46" class="text-val">PADDOCKS 1-4 &amp; CONTROL</text>

      <text x="0" y="60" class="text-field">EMPLOYEE ID:</text>
      <text x="60" y="60" class="text-val">#9908-JQA-LABS</text>

      <text x="0" y="74" class="text-field">STATUS:</text>
      <text x="60" y="74" class="text-val" fill="#39FF14">ACTIVE / SECURE</text>
    </g>
  </g>

  <!-- Barcode (Bottom) -->
  <g transform="translate(20, 180)">
    <!-- Simulated barcode using lines of varying stroke widths -->
    <rect width="210" height="20" fill="#FFFFFF" rx="2" />
    <!-- Barcode lines -->
    <g class="barcode" fill="#000000" transform="translate(5, 2)">
      <rect x="0" width="3" height="16" />
      <rect x="5" width="1" height="16" />
      <rect x="8" width="4" height="16" />
      <rect x="15" width="2" height="16" />
      <rect x="19" width="1" height="16" />
      <rect x="22" width="5" height="16" />
      <rect x="30" width="1" height="16" />
      <rect x="33" width="3" height="16" />
      <rect x="38" width="2" height="16" />
      <rect x="42" width="4" height="16" />
      <rect x="48" width="1" height="16" />
      <rect x="51" width="3" height="16" />
      <rect x="56" width="2" height="16" />
      <rect x="60" width="4" height="16" />
      <rect x="66" width="1" height="16" />
      <rect x="69" width="3" height="16" />
      <rect x="74" width="2" height="16" />
      <rect x="78" width="4" height="16" />
      <rect x="85" width="3" height="16" />
      <rect x="90" width="1" height="16" />
      <rect x="93" width="4" height="16" />
      <rect x="100" width="2" height="16" />
      <rect x="104" width="1" height="16" />
      <rect x="107" width="5" height="16" />
      <rect x="115" width="1" height="16" />
      <rect x="118" width="3" height="16" />
      <rect x="123" width="2" height="16" />
      <rect x="127" width="4" height="16" />
      <rect x="133" width="1" height="16" />
      <rect x="136" width="3" height="16" />
      <rect x="141" width="2" height="16" />
      <rect x="145" width="4" height="16" />
      <rect x="151" width="1" height="16" />
      <rect x="154" width="3" height="16" />
      <rect x="159" width="2" height="16" />
      <rect x="163" width="4" height="16" />
      <rect x="169" width="1" height="16" />
      <rect x="172" width="3" height="16" />
      <rect x="177" width="2" height="16" />
      <rect x="181" width="4" height="16" />
      <rect x="188" width="3" height="16" />
      <rect x="193" width="1" height="16" />
      <rect x="196" width="3" height="16" />
    </g>
    <!-- Card ID text -->
    <text x="240" y="14" font-family="'JetBrains Mono', monospace" fill="#FFFFFF" font-size="9" font-weight="700">CLR_LVL: 5</text>
  </g>
</svg>
