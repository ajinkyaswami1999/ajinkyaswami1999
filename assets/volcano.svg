<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;family=Orbitron:wght@700&amp;display=swap');

      .bg { fill: #08110C; rx: 6px; stroke: #11251B; stroke-width: 1.5; }
      .grid { stroke: #11251B; stroke-width: 0.5; }
      .text-title { font-family: 'Orbitron', sans-serif; font-weight: 700; fill: #FFFFFF; font-size: 10px; letter-spacing: 1.5px; }
      .text-data { font-family: 'JetBrains Mono', monospace; fill: #9CA3AF; font-size: 8px; }
      .mountain { fill: #040906; stroke: #11251B; stroke-width: 1; }
      .lava { fill: none; stroke: #E53935; stroke-width: 2; filter: drop-shadow(0 0 4px #E53935); }
      .grid-wave { fill: none; stroke: #F5B301; stroke-width: 1; opacity: 0.6; }
      
      @keyframes pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.9; }
      }
      @keyframes lavaFlow {
        0% { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: 20; }
      }
      .anim-pulse { animation: pulse 2.5s infinite ease-in-out; }
      .anim-flow { stroke-dasharray: 4, 2; animation: lavaFlow 1.5s infinite linear; }
    </style>
  </defs>

  <!-- Container -->
  <rect width="300" height="200" class="bg" />

  <!-- Oscilloscope Grid -->
  <g opacity="0.3">
    <!-- Verticals -->
    <line x1="30" y1="0" x2="30" y2="200" class="grid" />
    <line x1="60" y1="0" x2="60" y2="200" class="grid" />
    <line x1="90" y1="0" x2="90" y2="200" class="grid" />
    <line x1="120" y1="0" x2="120" y2="200" class="grid" />
    <line x1="150" y1="0" x2="150" y2="200" class="grid" />
    <line x1="180" y1="0" x2="180" y2="200" class="grid" />
    <line x1="210" y1="0" x2="210" y2="200" class="grid" />
    <line x1="240" y1="0" x2="240" y2="200" class="grid" />
    <line x1="270" y1="0" x2="270" y2="200" class="grid" />
    <!-- Horizontals -->
    <line x1="0" y1="30" x2="300" y2="30" class="grid" />
    <line x1="0" y1="60" x2="300" y2="60" class="grid" />
    <line x1="0" y1="90" x2="300" y2="90" class="grid" />
    <line x1="0" y1="120" x2="300" y2="120" class="grid" />
    <line x1="0" y1="150" x2="300" y2="150" class="grid" />
    <line x1="0" y1="180" x2="300" y2="180" class="grid" />
  </g>

  <!-- Title & Headers -->
  <g transform="translate(15, 20)">
    <text x="0" y="0" class="text-title">SEISMIC ACTIVITY: MOUNT SIBO</text>
    <text x="0" y="12" class="text-data">SECTOR: NORTH-EAST PADDOCK ZONE</text>
  </g>

  <!-- Mountain Silhouette (Mount Sibo) -->
  <path d="M 30,200 L 110,120 L 135,120 L 140,130 L 155,130 L 160,120 L 180,120 L 270,200 Z" class="mountain" />
  
  <!-- Active Lava Vents & Flow -->
  <path d="M 135,120 Q 138,150 142,175 Q 146,180 152,200" class="lava anim-flow" />
  <path d="M 155,130 Q 158,160 154,185 L 158,200" class="lava anim-flow" opacity="0.8" />
  
  <!-- Heat Chamber (Pulsating Glow) -->
  <ellipse cx="147" cy="125" rx="15" ry="8" fill="#E53935" class="anim-pulse" />

  <!-- Seismic Waves overlay -->
  <path d="M 10,170 Q 30,165 40,180 T 60,175 T 80,185 T 100,160 T 110,175 T 120,165 L 140,165" class="grid-wave" />
  <path d="M 160,175 L 180,175 Q 190,160 205,185 T 230,165 T 260,180 T 290,170" class="grid-wave" />

  <!-- Geological data readouts -->
  <g transform="translate(180, 45)">
    <rect width="105" height="60" rx="3" fill="#08110C" fill-opacity="0.9" stroke="#11251B" stroke-width="1" />
    <g transform="translate(8, 15)">
      <text x="0" y="0" class="text-data">MAGMA LVL: <tspan fill="#E53935">CRITICAL</tspan></text>
      <text x="0" y="12" class="text-data">SEISMIC: 3.4 Richter</text>
      <text x="0" y="24" class="text-data">TEMP: 1,120°C</text>
      <text x="0" y="36" class="text-data">VENT STATUS: VENTING</text>
    </g>
  </g>
</svg>
